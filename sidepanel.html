<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Refraktor</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">Refraktor</div>
      <div class="status" id="status">
        <span class="dot" id="status-dot"></span>
        <span id="status-text">Looking for tools…</span>
      </div>
    </header>

    <div id="activate" class="activate" hidden>
      <button
        id="activate-auto"
        class="activate-btn"
        type="button"
        title="Grants the optional all-sites permission so tools appear automatically on every page — the old default. Revoke anytime from the ◎ toggle."
      >Auto-scan all sites</button>
      <span class="activate-hint">or use the toolbar icon for just this page</span>
    </div>

    <main id="messages" class="messages">
      <div class="empty" id="empty-state">
        <p>Open a page that exposes WebMCP tools, then ask for something.</p>
        <p class="hint">The agent discovers the page's tools and calls them for you.</p>
      </div>
    </main>

    <form id="composer" class="composer" autocomplete="off">
      <textarea
        id="input"
        rows="1"
        placeholder="Ask the page's tools to do something…"
      ></textarea>
      <button id="send" type="submit" title="Send" aria-label="Send">↑</button>
    </form>

    <footer class="footer">
      <select id="model" class="model" title="Gemini model">
        <option value="gemini-2.5-pro">2.5 Pro</option>
        <option value="gemini-2.5-flash">2.5 Flash</option>
      </select>
      <input
        id="apikey"
        class="apikey"
        type="password"
        placeholder="Gemini API key (stored locally)"
        spellcheck="false"
      />
      <button id="autoscan" class="ghost" title="Automatic scanning: off — click to scan every site automatically" aria-label="Toggle automatic scanning">◎</button>
      <button id="copy" class="ghost" title="Copy transcript (tool calls, args, results)" aria-label="Copy transcript">⧉</button>
      <button id="refresh" class="ghost" title="Re-scan this page for tools" aria-label="Refresh tools">↻</button>
    </footer>

    <script type="module" src="sidepanel.js"></script>
  </body>
</html>
